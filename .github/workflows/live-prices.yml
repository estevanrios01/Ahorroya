name: Live Prices

on:
  # Emergency pause: Supabase exceeded the Free Plan database space
  # and is running out of Disk IO budget. Re-enable this schedule only
  # after cleanup/upgrade and after lowering write volume.
  # schedule:
  #   - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: live-prices
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
      - run: npm ci --include=optional
      - run: npm run prices:live
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LIVE_SYNC_ALLOW_INSECURE_TLS: "1"
          LIVE_SYNC_PRODUCTS_PER_TERM: "180"
          LIVE_SYNC_STORES_PER_RUN: "4"
          LIVE_SYNC_TERMS_PER_RUN: "3"
          LIVE_SYNC_BATCH_SIZE: "20"
          LIVE_SYNC_SKIP_IMAGES: "1"
          LIVE_SYNC_STORES: "exito,carulla,olimpica,jumbo,metro,mercaldas,megatiendas,euro,larebaja,colsubsidio,locatel,medipiel,bellapiel,pasteur"
      - run: npm run prices:makro
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          IMPORT_BATCH_SIZE: "25"
          IMPORT_SKIP_PRODUCT_IMAGES: "1"
          IMPORT_SKIP_PRICE_HISTORY: "0"
      - run: npm run prices:farmatodo
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FARMATODO_TARGET_PRODUCTS: "200"
          FARMATODO_TERMS: "arroz,leche,aceite,acetaminofen,ibuprofeno,shampoo,crema"
          IMPORT_BATCH_SIZE: "25"
          IMPORT_SKIP_PRODUCT_IMAGES: "1"
          IMPORT_SKIP_PRICE_HISTORY: "0"
      - run: npm run prices:ara
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ARA_MAX_PAGES: "2"
          IMPORT_BATCH_SIZE: "25"
          IMPORT_SKIP_PRODUCT_IMAGES: "1"
          IMPORT_SKIP_PRICE_HISTORY: "0"
